<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141414" />
      <stop offset="100%" stop-color="#080808" />
    </linearGradient>
  </defs>

  <!-- Background Circle with luxury border -->
  <circle cx="256" cy="256" r="236" fill="url(#bgGrad)" stroke="url(#orangeGrad)" stroke-width="12" />
  <circle cx="256" cy="256" r="226" fill="none" stroke="#FBBF24" stroke-width="2" stroke-dasharray="8 8" opacity="0.6" />

  <!-- Logo Graphics -->
  <g transform="translate(0, -10)">
    <!-- Roof - Styled House Peak -->
    <path d="M 256,105 L 400,215 L 375,235 L 256,145 L 137,235 L 112,215 Z" fill="url(#orangeGrad)" />
    
    <!-- Left Pillar / Stem of the letter 'P' -->
    <path d="M 165,225 L 195,225 L 195,370 L 165,370 Z" fill="url(#goldGrad)" />
    
    <!-- Loop of the 'P' -->
    <path d="M 195,225 C 240,225 260,240 260,270 C 260,300 240,315 195,315 L 195,225 Z" fill="url(#goldGrad)" opacity="0.95" />
    
    <!-- An inner cutout for the P loop to make it clear -->
    <path d="M 195,245 L 225,245 C 238,245 242,252 242,270 C 242,288 238,295 225,295 L 195,295 Z" fill="url(#bgGrad)" />

    <!-- Right Leg of 'A' -->
    <path d="M 245,260 L 290,225 L 345,370 L 315,370 L 285,290 Z" fill="url(#orangeGrad)" />

    <!-- Crossbar of 'A' -->
    <path d="M 245,315 L 305,315 L 301,330 L 235,330 Z" fill="url(#goldGrad)" opacity="0.8" />
    
    <!-- Decorative window / star in the center under the roof peak -->
    <polygon points="256,165 264,185 284,185 268,197 274,217 256,205 238,217 244,197 228,185 248,185" fill="#FFFFFF" />
  </g>
</svg>